{% extends "base.html" %}
{% block title %}Reset Password — Nexus{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="brand-icon-lg">◈</span>
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-subtitle">Enter your email to receive a reset link</p>
    </div>
    <form class="auth-form" method="POST" action="{{ url_for('auth.forgot_password') }}" id="fpForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="btn btn--primary btn--full" id="fpBtn">Send Reset Link</button>
    </form>
    <p class="auth-switch">
      Remembered it? <a href="{{ url_for('auth.login_page') }}">Back to Sign In</a>
    </p>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
document.getElementById('fpForm').addEventListener('submit', function() {
  const btn = document.getElementById('fpBtn');
  btn.innerHTML = '<span class="spinner"></span> Sending...';
  btn.disabled = true;
  setTimeout(() => { btn.innerHTML = '✓ Link Sent!'; }, 1500);
});
</script>
{% endblock %}
