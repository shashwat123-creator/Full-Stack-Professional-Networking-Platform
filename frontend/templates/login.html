{% extends "base.html" %}
{% block title %}Sign In — Nexus{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="brand-icon-lg">◈</span>
      <h1 class="auth-title">Nexus</h1>
      <p class="auth-subtitle">Your professional network awaits</p>
    </div>
    <form class="auth-form" method="POST" action="{{ url_for('auth.login') }}" id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="toggle-pw" onclick="togglePassword('password')" tabindex="-1">👁</button>
        </div>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <label class="form-check">
          <input type="checkbox" name="remember_me" value="1"> Remember me
        </label>
        <a href="{{ url_for('auth.forgot_password_page') }}" class="forgot-link">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn--primary btn--full" id="loginBtn">
        Sign In
      </button>
    </form>
    <p class="auth-switch">
      Don't have an account? <a href="{{ url_for('auth.register_page') }}">Create one free</a>
    </p>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function togglePassword(id) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
document.getElementById('loginForm').addEventListener('submit', function() {
  const btn = document.getElementById('loginBtn');
  btn.innerHTML = '<span class="spinner"></span> Signing in...';
  btn.disabled = true;
});
</script>
{% endblock %}
